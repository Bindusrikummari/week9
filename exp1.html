<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Functions</title>
    <script>

        function factorial(n) {
            let fact = 1;
            for (let i = 1; i <= n; i++) {
                fact *= i;
            }
            return fact;
        }

        function fibonacci(n) {
            let a = 0, b = 1;
            let result = "";
            while (a <= n) {
                result += a + " ";
                let temp = a + b;
                a = b;
                b = temp;
            }
            return result;
        }

        function primes(n) {
            let result = "";
            for (let i = 2; i <= n; i++) {
                let isPrime = true;
                for (let j = 2; j <= Math.sqrt(i); j++) {
                    if (i % j === 0) {
                        isPrime = false;
                        break;
                    }
                }
                if (isPrime) result += i + " ";
            }
            return result;
        }

        function palindrome(n) {
            let str = n.toString();
            let rev = str.split("").reverse().join("");
            return str === rev;
        }

        function calculate() {
            let num = parseInt(document.getElementById("num").value);

            let output = "";
            output += "Factorial: " + factorial(num) + "<br>";
            output += "Fibonacci Series: " + fibonacci(num) + "<br>";
            output += "Prime Numbers: " + primes(num) + "<br>";
            output += palindrome(num) ? "Palindrome" : "Not Palindrome";

            document.getElementById("result").innerHTML = output;
        }

    </script>
</head>
<body>

<h2>JavaScript Functions Example</h2>

Enter Number: <input type="text" id="num">
<button onclick="calculate()">Calculate</button>

<p id="result"></p>

</body>
</html>
